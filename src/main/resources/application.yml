spring:
  application:
    name: xorazm-delivery

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:xorazm_delivery}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:Jasurbek_2105}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  cache:
    type: redis
    redis:
      time-to-live: 600000

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,text/plain
  error:
    include-message: never
    include-stacktrace: never

# JWT Configuration
jwt:
  private-key: ${JWT_PRIVATE_KEY_PATH:classpath:keys/private.pem}
  public-key: ${JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}
  access-token-expiry: 900          # 15 minutes
  refresh-token-expiry: 2592000     # 30 days

# External APIs
eskiz:
  base-url: https://notify.eskiz.uz/api
  email: ${ESKIZ_EMAIL:test@eskiz.uz}
  password: ${ESKIZ_PASSWORD:secret}
  sender: ${ESKIZ_SENDER:4546}

click:
  base-url: https://api.click.uz/v2/merchant
  merchant-id: ${CLICK_MERCHANT_ID:0}
  secret-key: ${CLICK_SECRET_KEY:secret}
  service-id: ${CLICK_SERVICE_ID:0}

payme:
  base-url: https://checkout.paycom.uz/api
  merchant-id: ${PAYME_MERCHANT_ID:0}
  secret-key: ${PAYME_SECRET_KEY:secret}

# Delivery pricing
delivery:
  base-fee: 5000
  per-km-fee: 500
  per-kg-fee: 200
  min-fee: 7000
  night-multiplier: 1.30
  holiday-multiplier: 1.50
  bulk-discount: 0.85        # for 10+ kg
  premium-discount: 0.90
  night-start-hour: 22
  night-end-hour: 6
  courier-search-radius-km: 3
  courier-search-max-radius-km: 7
  courier-accept-timeout-sec: 60
  max-assignment-wait-min: 10

# Rate Limiting
rate-limit:
  unauthenticated-rpm: 20
  authenticated-rpm: 200
  otp-rph: 3                 # per hour per phone

# MinIO
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:xorazm-delivery}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      redis:
        enabled: false
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

logging:
  level:
    uz.xorazmdelivery: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
  cache:
    type: simple
  autoconfigure:
    exclude:
      - org.springframework.boot.actuate.autoconfigure.redis.RedisReactiveHealthContributorAutoConfiguration
logging:
  level:
    uz.xorazmdelivery: DEBUG

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:tc:postgresql:15:///xorazm_test
  flyway:
    locations: classpath:db/migration,classpath:db/testdata

# CORS
cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:3001
    - ${FRONTEND_URL:https://xorazmdelivery.uz}
