worker_processes auto;
events { worker_connections 1024; }

http {
    # ── Rate limiting (Nginx darajasida) ─────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ── Logging ──────────────────────────────────────────────────
    log_format main '$remote_addr - $request [$time_local] '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip ─────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1000;

    # ── HTTP → HTTPS redirect ────────────────────────────────────
    server {
        listen 80;
        server_name xorazmdelivery.uz api.xorazmdelivery.uz;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS — API ──────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.xorazmdelivery.uz;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.3;
        ssl_prefer_server_ciphers off;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;

        # Auth endpoints — qat'iy limit
        location /v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://app:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # Actuator — faqat ichki
        location /actuator/ {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://app:8080;
        }

        # Asosiy API
        location / {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }
    }
}
